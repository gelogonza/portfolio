<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelo Gonzalez</title>
    <link rel="icon" type="image/gif" href="fav-flip.gif">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <input type="checkbox" id="opening-about" hidden>
    <input type="checkbox" id="opening-experience" hidden>
    <input type="checkbox" id="opening-projects" hidden>
    <input type="checkbox" id="opening-designs" hidden>
    <input type="checkbox" id="opening-contact" hidden>

    <main id="desktop">
        <nav id="icons">
            <label for="opening-about" class="icon">
                <img src="icons/angelo.jpeg" width="60" height="60" alt="image of angelo">
                <span class="icon-label">about me</span>
            </label>
            <label for="opening-experience" class="icon">
                <img src="icons/folder-icon.png" width="48" height="48" alt="experience folder">
                <span class="icon-label">experience</span>
            </label>
            <label for="opening-projects" class="icon">
                <img src="icons/folder-icon.png" width="48" height="48" alt="projects folder">
                <span class="icon-label">projects</span>
            </label>
            <label for="opening-designs" class="icon">
                <img src="icons/design-icon.png" width="48" height="48" alt="designs folder">
                <span class="icon-label">designs</span>
            </label>
            <a href="assets/AngeloGonzalezResume2025.pdf" target="_blank" rel="noreferrer" class="icon">
                <img src="icons/pdf-icon.png" width="48" height="48" alt="angelo's resume">
                <span class="icon-label">resume</span>
            <a href="https://github.com/gelogonza" target="_blank"  rel="noreferrer" class="icon">
                <img src="icons/github.png" width="48" height="48" alt="angelo's github profile">
                <span class="icon-label">github</span>
            <a href="https://linkedin.com/in/angelo-gonza" target="_blank"  rel="noreferrer" class="icon">
                <img src="icons/linkedin.png" width="48" height="48" alt="angelo's linkedin profile">
                <span class="icon-label">linkedin</span>
            <a href="pages/contact.html" class="icon">
                <img src="icons/contact.png" width="48" height="48" alt="getting in contact with angelo">
                <span class="icon-label">contact</span>
            <a href="https://open.spotify.com/user/6orsc468zs7lp466a1x726uf9?si=3ee6633906bc42c5" target="_blank" rel="noreferrer" class="icon">
                <img src="icons/spotify.png" width="48" height="48" alt="angelo's spotify profile">
                <span class="icon-label">spotify</span>
        </nav>
    </main>
    
    
</body>
</html>
